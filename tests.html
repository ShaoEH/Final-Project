<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Tests | Muse & Medium</title>
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            padding: 2rem; 
            background: #1e1e1e; 
            color: #d4d4d4; 
        }
        h1 { 
            color: #569cd6; 
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .pass { color: #4af626; }
        .fail { color: #f44747; }
        ul { list-style-type: none; padding: 0; font-size: 1.1rem; }
        li { margin-bottom: 12px; padding: 12px; background: #252526; border-left: 4px solid #333; }
        li.pass { border-left-color: #4af626; }
        li.fail { border-left-color: #f44747; }
        .summary { margin-top: 2rem; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>
    <h1>Automated Tests Runner (Unit Tests)</h1>
    <p>Testing appLogic module and data integrity.</p>
    
    <ul id="test-results"></ul>
    <div id="test-summary" class="summary"></div>

    <script src="script.js"></script>
    <script src="tests.js"></script>
</body>
</html>
